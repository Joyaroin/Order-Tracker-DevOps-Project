apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-tracker-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Joyaroin/Order-Tracker-DevOps-Project.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
