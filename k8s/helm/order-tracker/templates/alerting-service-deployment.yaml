apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerting-service
  labels:
    app: alerting-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: {{ .Values.alertingService.replicas }}
  selector:
    matchLabels:
      app: alerting-service
  template:
    metadata:
      labels:
        app: alerting-service
    spec:
      containers:
        - name: alerting-service
          image: {{ include "ot.image" (dict "ctx" . "svc" .Values.alertingService) }}
          ports:
            - containerPort: {{ .Values.alertingService.port }}
          resources:
            {{- toYaml .Values.alertingService.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: alerting-service-config
            - configMapRef:
                name: db-config
            - secretRef:
                name: {{ .Values.database.credentialsSecret }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.alertingService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
