apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerting-service
  labels:
    app: alerting-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alerting-service
  template:
    metadata:
      labels:
        app: alerting-service
    spec:
      containers:
        - name: alerting-service
          image: alerting-service:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: alerting-service-config
            - configMapRef:
                name: db-config
            - secretRef:
                name: db-credentials
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
