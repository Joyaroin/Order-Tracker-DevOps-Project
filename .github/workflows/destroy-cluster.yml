name: Destroy Cluster

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  CLUSTER_NAME: k8s-learning
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
  TF_WORKING_DIR: infra/terraform

jobs:
  destroy-cluster:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=order-tracker/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }} || true

      - name: Pre-clean in-cluster workloads and storage
        run: |
          kubectl delete application kafka postgres-dev postgres-staging -n argocd --ignore-not-found=true || true
          kubectl delete applicationset order-tracker-environments -n argocd --ignore-not-found=true || true

          for namespace in dev staging kafka argocd; do
            echo "Cleaning namespace: $namespace"
            kubectl delete pvc --all -n "$namespace" --ignore-not-found=true || true
            kubectl delete all --all -n "$namespace" --ignore-not-found=true || true
          done

          kubectl delete pv --all --ignore-not-found=true || true

          for namespace in dev staging kafka; do
            kubectl delete namespace "$namespace" --ignore-not-found=true || true
          done

          echo "Waiting briefly for Kubernetes-managed AWS resources to start tearing down..."
          sleep 45

      # Cluster-managed ELBs (frontend/staging/argocd LoadBalancers) create
      # AWS load balancers outside Terraform state. If they're still around at
      # destroy time they hold ENIs in the VPC and block subnet deletion.
      # Delete any ELBs attached to the cluster's VPC before tearing down.
      - name: Pre-clean cluster-managed load balancers
        run: |
          VPC_ID=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region "$AWS_REGION" \
            --query 'cluster.resourcesVpcConfig.vpcId' --output text 2>/dev/null || true)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "Cluster not found or already gone — nothing to pre-clean."
            exit 0
          fi

          echo "Found cluster VPC: $VPC_ID"

          CLBS=$(aws elb describe-load-balancers --region "$AWS_REGION" \
            --query "LoadBalancerDescriptions[?VPCId=='$VPC_ID'].LoadBalancerName" \
            --output text)
          for lb in $CLBS; do
            echo "Deleting classic LB: $lb"
            aws elb delete-load-balancer --load-balancer-name "$lb" --region "$AWS_REGION" || true
          done

          ALBS=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
            --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" \
            --output text)
          for alb in $ALBS; do
            echo "Deleting ALB/NLB: $alb"
            aws elbv2 delete-load-balancer --load-balancer-arn "$alb" --region "$AWS_REGION" || true
          done

          if [ -n "$CLBS" ] || [ -n "$ALBS" ]; then
            echo "Waiting 45s for load balancers and their ENIs to clear..."
            sleep 45
          fi

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="region=${AWS_REGION}" \
            -var="cluster_name=${CLUSTER_NAME}"

      - name: Write job summary
        if: always()
        run: |
          echo "## Cluster Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | \`${{ env.CLUSTER_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Destroyed by** | Terraform |" >> $GITHUB_STEP_SUMMARY
