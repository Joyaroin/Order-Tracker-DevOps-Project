name: Destroy Cluster

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  CLUSTER_NAME: k8s-learning
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
  TF_WORKING_DIR: infra/terraform

jobs:
  destroy-cluster:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=order-tracker/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.CLUSTER_NAME }} || true

      - name: Pre-clean in-cluster workloads and storage
        run: |
          kubectl delete applicationset order-tracker-environments -n argocd --ignore-not-found=true || true

          for app in order-tracker-dev order-tracker-staging postgres-dev postgres-staging; do
            kubectl patch application "$app" -n argocd --type merge -p '{"metadata":{"finalizers":[]}}' || true
            kubectl delete application "$app" -n argocd --ignore-not-found=true || true
          done

          for namespace in dev staging; do
            echo "Deleting application resources in namespace: $namespace"
            kubectl delete jobs.batch --all -n "$namespace" --ignore-not-found=true || true
            kubectl delete deployments.apps,statefulsets.apps,daemonsets.apps,replicasets.apps --all -n "$namespace" --ignore-not-found=true || true
            kubectl delete svc --all -n "$namespace" --ignore-not-found=true || true
            kubectl delete configmap,secret --all -n "$namespace" --ignore-not-found=true || true
            kubectl delete pvc --all -n "$namespace" --ignore-not-found=true || true
          done

          kubectl delete svc --all -n argocd --ignore-not-found=true || true
          kubectl delete deployments.apps,statefulsets.apps,replicasets.apps --all -n argocd --ignore-not-found=true || true
          kubectl delete jobs.batch --all -n argocd --ignore-not-found=true || true

          kubectl delete pv --all --ignore-not-found=true || true

          for namespace in dev staging; do
            kubectl delete namespace "$namespace" --ignore-not-found=true || true
          done

          echo "Waiting briefly for Kubernetes-managed AWS resources to start tearing down..."
          sleep 60

      - name: Pre-clean ECR repositories
        run: |
          for repo in order-api alerting-service frontend; do
            echo "Checking ECR repository: $repo"

            if ! aws ecr describe-repositories --repository-names "$repo" --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "Repository $repo does not exist or is already deleted."
              continue
            fi

            IMAGE_IDS=$(aws ecr list-images \
              --repository-name "$repo" \
              --region "$AWS_REGION" \
              --query 'imageIds[*]' \
              --output json)

            if [ "$IMAGE_IDS" = "[]" ]; then
              echo "Repository $repo is already empty."
              continue
            fi

            echo "$IMAGE_IDS" > /tmp/"$repo"-image-ids.json
            aws ecr batch-delete-image \
              --repository-name "$repo" \
              --region "$AWS_REGION" \
              --image-ids file:///tmp/"$repo"-image-ids.json || true
          done

      # Cluster-managed ELBs (frontend/staging/argocd LoadBalancers) create
      # AWS load balancers outside Terraform state. If they're still around at
      # destroy time they hold ENIs in the VPC and block subnet deletion.
      # Delete any ELBs attached to the cluster's VPC before tearing down.
      - name: Pre-clean cluster-managed load balancers
        run: |
          VPC_ID=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region "$AWS_REGION" \
            --query 'cluster.resourcesVpcConfig.vpcId' --output text 2>/dev/null || true)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "Cluster not found or already gone — nothing to pre-clean."
            exit 0
          fi

          echo "Found cluster VPC: $VPC_ID"

          for attempt in $(seq 1 10); do
            CLBS=$(aws elb describe-load-balancers --region "$AWS_REGION" \
              --query "LoadBalancerDescriptions[?VPCId=='$VPC_ID'].LoadBalancerName" \
              --output text)
            for lb in $CLBS; do
              echo "Deleting classic LB: $lb"
              aws elb delete-load-balancer --load-balancer-name "$lb" --region "$AWS_REGION" || true
            done

            ALBS=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
              --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" \
              --output text)
            for alb in $ALBS; do
              echo "Deleting ALB/NLB: $alb"
              aws elbv2 delete-load-balancer --load-balancer-arn "$alb" --region "$AWS_REGION" || true
            done

            if [ -z "$CLBS" ] && [ -z "$ALBS" ]; then
              echo "No cluster-managed load balancers remain."
              exit 0
            fi

            echo "Attempt $attempt/10 - waiting 30s for load balancers and ENIs to clear..."
            sleep 30
          done

          echo "Load balancer cleanup timed out; Terraform destroy will retry dependency cleanup."

      - name: Pre-clean leftover VPC dependencies
        run: |
          VPC_ID=$(aws eks describe-cluster --name "$CLUSTER_NAME" --region "$AWS_REGION" \
            --query 'cluster.resourcesVpcConfig.vpcId' --output text 2>/dev/null || true)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "Cluster not found or already gone — nothing to dependency-clean."
            exit 0
          fi

          echo "Cleaning available ENIs in VPC: $VPC_ID"
          ENIS=$(aws ec2 describe-network-interfaces --region "$AWS_REGION" \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query 'NetworkInterfaces[?Status==`available`].NetworkInterfaceId' \
            --output text)
          for eni in $ENIS; do
            echo "Deleting ENI: $eni"
            aws ec2 delete-network-interface --network-interface-id "$eni" --region "$AWS_REGION" || true
          done

          echo "Waiting 30s for AWS dependency cleanup to settle..."
          sleep 30

      - name: Terraform Destroy
        id: terraform-destroy
        continue-on-error: true
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="region=${AWS_REGION}" \
            -var="cluster_name=${CLUSTER_NAME}"

      - name: Retry cleanup after failed destroy
        if: steps.terraform-destroy.outcome == 'failure'
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --region "$AWS_REGION" \
            --filters "Name=tag:Name,Values=order-tracker-vpc" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || true)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "Project VPC not found; skipping retry cleanup."
            exit 0
          fi

          echo "Retry cleanup for VPC: $VPC_ID"

          CLBS=$(aws elb describe-load-balancers --region "$AWS_REGION" \
            --query "LoadBalancerDescriptions[?VPCId=='$VPC_ID'].LoadBalancerName" \
            --output text)
          for lb in $CLBS; do
            aws elb delete-load-balancer --load-balancer-name "$lb" --region "$AWS_REGION" || true
          done

          ALBS=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
            --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" \
            --output text)
          for alb in $ALBS; do
            aws elbv2 delete-load-balancer --load-balancer-arn "$alb" --region "$AWS_REGION" || true
          done

          sleep 60

          ENIS=$(aws ec2 describe-network-interfaces --region "$AWS_REGION" \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query 'NetworkInterfaces[?Status==`available`].NetworkInterfaceId' \
            --output text)
          for eni in $ENIS; do
            aws ec2 delete-network-interface --network-interface-id "$eni" --region "$AWS_REGION" || true
          done

      - name: Terraform Destroy Retry
        if: steps.terraform-destroy.outcome == 'failure'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="region=${AWS_REGION}" \
            -var="cluster_name=${CLUSTER_NAME}"

      - name: Write job summary
        if: always()
        run: |
          echo "## Cluster Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | \`${{ env.CLUSTER_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Destroyed by** | Terraform |" >> $GITHUB_STEP_SUMMARY
