name: Create Ephemeral Environment

on:
  push:
    branches:
      - hotfix/**

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 284495577709.dkr.ecr.us-east-2.amazonaws.com

jobs:
  create-env:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4

      - name: Set environment name
        run: |
          ENV_NAME="${GITHUB_REF_NAME//\//-}"
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push order-api
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-api
          push: true
          tags: ${{ env.ECR_REGISTRY }}/order-api:${{ github.sha }}

      - name: Build and push alerting-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/alerting-service
          push: true
          tags: ${{ env.ECR_REGISTRY }}/alerting-service:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/frontend:${{ github.sha }}

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create overlay from dev
        run: |
          cp -r k8s/overlays/dev k8s/overlays/${{ env.ENV_NAME }}
          sed -i "s/namespace: dev/namespace: ${{ env.ENV_NAME }}/" k8s/overlays/${{ env.ENV_NAME }}/kustomization.yaml
          sed -i 's/newTag: .*/newTag: "${{ github.sha }}"/' k8s/overlays/${{ env.ENV_NAME }}/kustomization.yaml
          sed -i 's/ENVIRONMENT: "dev"/ENVIRONMENT: "${{ env.ENV_NAME }}"/' k8s/overlays/${{ env.ENV_NAME }}/*.yaml
          sed -i 's/REACT_APP_ENVIRONMENT: "dev"/REACT_APP_ENVIRONMENT: "${{ env.ENV_NAME }}"/' k8s/overlays/${{ env.ENV_NAME }}/*.yaml

      - name: Commit and push to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/overlays/${{ env.ENV_NAME }}
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Create ephemeral environment ${{ env.ENV_NAME }}" && git push origin main)

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Wait for LoadBalancer URL
        id: get-url
        run: |
          echo "Waiting for LoadBalancer to be assigned..."
          for i in $(seq 1 24); do
            URL=$(kubectl get svc frontend -n ${{ env.ENV_NAME }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$URL" ]; then
              echo "url=http://$URL" >> $GITHUB_OUTPUT
              echo "Found URL: http://$URL"
              break
            fi
            echo "Attempt $i/24 - not ready yet, waiting 15s..."
            sleep 15
          done

      - name: Write job summary
        if: always()
        run: |
          if [ -n "${{ steps.get-url.outputs.url }}" ]; then
            echo "## Ephemeral Environment Ready" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **Environment** | \`${{ env.ENV_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **URL** | ${{ steps.get-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> This environment will be automatically destroyed when the branch is deleted." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Ephemeral Environment - URL Not Available" >> $GITHUB_STEP_SUMMARY
            echo "LoadBalancer URL was not assigned within the timeout. Check the cluster manually." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post PR comment with environment URL
        if: steps.get-url.outputs.url != ''
        run: |
          PR_NUMBER=$(gh pr list --head $GITHUB_REF_NAME --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr comment $PR_NUMBER --body "**Ephemeral environment deployed** | Environment: \`${{ env.ENV_NAME }}\` | URL: ${{ steps.get-url.outputs.url }} | This environment will be automatically destroyed when this branch is deleted."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
