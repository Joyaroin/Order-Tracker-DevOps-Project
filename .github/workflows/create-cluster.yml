name: Create Cluster

on:
  workflow_dispatch:
    inputs:
      node_type:
        description: "EC2 node type"
        required: false
        default: "t3.medium"
      node_count:
        description: "Desired number of nodes"
        required: false
        default: "2"

env:
  AWS_REGION: us-east-2
  CLUSTER_NAME: k8s-learning
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
  TF_WORKING_DIR: infra/terraform

jobs:
  create-cluster:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=order-tracker/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -var="region=${AWS_REGION}" \
            -var="cluster_name=${CLUSTER_NAME}" \
            -var='node_instance_types=["${{ github.event.inputs.node_type }}"]' \
            -var="node_desired_size=${{ github.event.inputs.node_count }}"

      - name: Capture Terraform outputs
        id: tf-out
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "region=$(terraform output -raw region)" >> $GITHUB_OUTPUT

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ steps.tf-out.outputs.region }} \
            --name ${{ steps.tf-out.outputs.cluster_name }}

      - name: Install ArgoCD
        run: |
          kubectl get namespace argocd >/dev/null 2>&1 || kubectl create namespace argocd
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side
          kubectl wait --for=condition=available --timeout=120s deployment --all -n argocd

      - name: Expose ArgoCD server
        id: argocd-url
        run: |
          kubectl patch svc argocd-server -n argocd -p '{"spec":{"type":"LoadBalancer"}}'

          echo "Waiting for ArgoCD LoadBalancer hostname..."
          for i in $(seq 1 40); do
            HOSTNAME=$(kubectl get svc argocd-server -n argocd -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOSTNAME" ]; then
              echo "url=https://$HOSTNAME" >> $GITHUB_OUTPUT
              echo "Found ArgoCD URL: https://$HOSTNAME"
              exit 0
            fi
            echo "Attempt $i/40 - not ready yet, waiting 15s..."
            sleep 15
          done

          echo "ArgoCD LoadBalancer hostname was not assigned within the timeout."
          exit 1

      - name: Bootstrap namespaces and DB secrets
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "GitHub secret DB_PASSWORD is required for Postgres-backed services."
            exit 1
          fi

          for namespace in dev staging; do
            kubectl get namespace "$namespace" >/dev/null 2>&1 || kubectl create namespace "$namespace"

            kubectl create secret generic db-credentials \
              -n "$namespace" \
              --from-literal=DB_PASSWORD="$DB_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Set default storage class
        run: |
          kubectl annotate storageclass gp2 storageclass.kubernetes.io/is-default-class=true --overwrite

      - name: Apply ArgoCD applications
        run: kubectl apply -k k8s/argocd

      - name: Wait for frontend URLs
        id: frontend-urls
        run: |
          wait_for_frontend_url() {
            NAMESPACE="$1"

            echo "Waiting for frontend service in namespace: $NAMESPACE" >&2
            for i in $(seq 1 40); do
              HOSTNAME=$(kubectl get svc frontend -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
              if [ -n "$HOSTNAME" ]; then
                echo "Found frontend URL for $NAMESPACE: http://$HOSTNAME" >&2
                printf '%s' "http://$HOSTNAME"
                return 0
              fi
              echo "Attempt $i/40 for $NAMESPACE - not ready yet, waiting 15s..." >&2
              sleep 15
            done

            echo "Frontend LoadBalancer hostname was not assigned in namespace $NAMESPACE within the timeout." >&2
            return 1
          }

          DEV_URL=$(wait_for_frontend_url dev)
          echo "dev_url=$DEV_URL" >> $GITHUB_OUTPUT

          STAGING_URL=$(wait_for_frontend_url staging)
          echo "staging_url=$STAGING_URL" >> $GITHUB_OUTPUT

      - name: Get ArgoCD admin password
        id: argocd-password
        run: |
          PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT

      - name: Write job summary
        run: |
          echo "## Cluster Ready" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | \`${{ steps.tf-out.outputs.cluster_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ steps.tf-out.outputs.region }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Provisioned by** | Terraform |" >> $GITHUB_STEP_SUMMARY
          echo "| **Nodes** | ${{ github.event.inputs.node_count }} x \`${{ github.event.inputs.node_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ArgoCD** | Installed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kafka** | Managed by ArgoCD |" >> $GITHUB_STEP_SUMMARY
          echo "| **PostgreSQL** | Managed by ArgoCD in \`dev\` and \`staging\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **DB secret** | Bootstrapped from GitHub secret \`DB_PASSWORD\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ArgoCD URL** | ${{ steps.argocd-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **ArgoCD password** | \`${{ steps.argocd-password.outputs.password }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dev frontend** | ${{ steps.frontend-urls.outputs.dev_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Staging frontend** | ${{ steps.frontend-urls.outputs.staging_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Run \`aws eks update-kubeconfig --region ${{ steps.tf-out.outputs.region }} --name ${{ steps.tf-out.outputs.cluster_name }}\` to connect locally." >> $GITHUB_STEP_SUMMARY
