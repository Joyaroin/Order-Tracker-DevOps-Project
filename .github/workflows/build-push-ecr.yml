name: Build and Push to ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 284495577709.dkr.ecr.us-east-2.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push order-api
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-api
          push: true
          tags: ${{ env.ECR_REGISTRY }}/order-api:${{ github.sha }}

      - name: Build and push alerting-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/alerting-service
          push: true
          tags: ${{ env.ECR_REGISTRY }}/alerting-service:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/frontend:${{ github.sha }}

      - name: Update image tags in kustomization files
        run: |
          sed -i 's/newTag: .*/newTag: "${{ github.sha }}"/' k8s/overlays/dev/kustomization.yaml
          sed -i 's/newTag: .*/newTag: "${{ github.sha }}"/' k8s/overlays/staging/kustomization.yaml

      - name: Commit and push updated tags
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/overlays/dev/kustomization.yaml k8s/overlays/staging/kustomization.yaml
          git commit -m "Update image tags to ${{ github.sha }}"
          git push
